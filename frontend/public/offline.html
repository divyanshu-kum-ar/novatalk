<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're Offline - NovaTalk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #0f172a 0%, #0a0f1e 100%);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #ffffff;
        overflow: hidden;
      }
      .container {
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 2.5rem 2rem;
        border-radius: 1.5rem;
        text-align: center;
        max-width: 420px;
        width: 85%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .icon-wrapper {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        background: rgba(239, 68, 68, 0.08);
        border: 1px solid rgba(239, 68, 68, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ef4444;
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }
      h2 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.025em;
        background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      p {
        color: #94a3b8;
        font-size: 0.875rem;
        margin: 0 0 1.75rem;
        line-height: 1.5;
      }
      button {
        background: #0ea5e9;
        color: #ffffff;
        border: none;
        padding: 0.75rem 1.75rem;
        font-weight: 600;
        font-size: 0.875rem;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.2);
      }
      button:hover {
        background: #0284c7;
        transform: translateY(-1px) scale(1.03);
        box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.35);
      }
      button:active {
        transform: translateY(0) scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon-wrapper">
        <svg style="width:32px;height:32px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 4.978 4.978 0 011.414-3.536m0 0L8.464 8.464M3 3l18 18" />
        </svg>
      </div>
      <h2>You're offline</h2>
      <p>Please reconnect to continue using NovaTalk.</p>
      <button onclick="window.location.reload()">Retry Connection</button>
    </div>
  </body>
</html>
